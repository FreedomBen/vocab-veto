# HPA stub per DESIGN §"Kubernetes deployment (DOKS)".
#
# Scales on CPU out of the box. The vv_inflight metric is left commented out
# because it requires a Prometheus custom-metrics adapter — DOKS does not
# install one by default. Once the adapter exposes `vv_inflight` under the
# Pods metric API, uncomment the Pods block and the target replicas will track
# in-flight concurrency rather than CPU alone.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: banned-words-service
  labels:
    app.kubernetes.io/name: banned-words-service
    app.kubernetes.io/part-of: vocab-veto
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: banned-words-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # - type: Pods
    #   pods:
    #     metric:
    #       name: vv_inflight
    #     target:
    #       type: AverageValue
    #       averageValue: "512"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30

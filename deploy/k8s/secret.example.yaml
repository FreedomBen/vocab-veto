# TEMPLATE ONLY — do not commit real keys.
#
# BWS_API_KEYS is a comma-separated list of bearer keys; each key SHOULD be at
# least 32 bytes of high-entropy random. Generate one with:
#
#   openssl rand -hex 32
#
# Create/rotate the real Secret out-of-band, e.g.:
#
#   kubectl create secret generic banned-words-service-keys \
#     --from-literal=BWS_API_KEYS="$(openssl rand -hex 32),$(openssl rand -hex 32)"
#
# Keys rotate via Secret edit + rolling restart — no hot reload, matching the
# "immutable at runtime" principle (DESIGN §Deployment).
apiVersion: v1
kind: Secret
metadata:
  name: banned-words-service-keys
  labels:
    app.kubernetes.io/name: banned-words-service
    app.kubernetes.io/part-of: vocab-veto
type: Opaque
stringData:
  BWS_API_KEYS: "REPLACE_ME_WITH_COMMA_SEPARATED_32BYTE_KEYS"
